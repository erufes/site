services:
  jekyll:
    image: jekyll-site:latest
    container_name: blog
    build:
      context: .
    volumes:
      - .:/usr/src/app
      - /usr/src/app/_site
    ports:
      - "4000:4000"
    command: bundle exec jekyll serve --host 0.0.0.0 --watch
    networks:
          - erusnet
networks:
  erusnet:
    external: true
